name: Tests

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt --check

    - name: Clippy
      run: cargo clippy --workspace

  test-sqlite:
    name: SQLite - Test & Benchmark
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - uses: Swatinem/rust-cache@v2

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Run tests with coverage
      run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      env:
        DATABASE_URL: "sqlite::memory:"

    - name: Run benchmarks
      run: |
        echo "Running benchmarks on SQLite..."
        timeout 60s cargo bench --bench crud_benchmarks -- --test || true
      env:
        DATABASE_URL: "sqlite::memory:"
        BENCHMARK_DATABASE_URL: "sqlite::memory:"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: lcov.info
        flags: unittests
        name: codecov-umbrella-sqlite
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  test-postgresql:
    name: PostgreSQL - Test & Benchmark
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2

    - name: Install PostgreSQL client
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client

    - name: Wait for PostgreSQL
      run: |
        until pg_isready -h localhost -p 5432 -U postgres; do
          echo "Waiting for PostgreSQL..."
          sleep 2
        done
        PGPASSWORD=password createdb -h localhost -p 5432 -U postgres benchmark_db || true

    - name: Run tests
      run: cargo test --workspace -- --test-threads=1
      env:
        DATABASE_URL: "postgres://postgres:password@localhost:5432/test_db"

    - name: Run benchmarks
      run: |
        echo "Running benchmarks on PostgreSQL..."
        timeout 60s cargo bench --bench crud_benchmarks -- --test || true
      env:
        DATABASE_URL: "postgres://postgres:password@localhost:5432/benchmark_db"
        BENCHMARK_DATABASE_URL: "postgres://postgres:password@localhost:5432/benchmark_db"

  test-timescaledb:
    name: TimescaleDB - Aggregate Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      timescaledb:
        image: timescale/timescaledb:2.23.0-pg17
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target/
        key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-build-

    - name: Install PostgreSQL client
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client

    - name: Wait for TimescaleDB
      run: |
        until pg_isready -h localhost -p 5432 -U postgres; do
          echo "Waiting for TimescaleDB..."
          sleep 2
        done
        # Verify TimescaleDB extension is available
        PGPASSWORD=password psql -h localhost -p 5432 -U postgres -d test_db -c "CREATE EXTENSION IF NOT EXISTS timescaledb;"

    - name: Install cargo-expand
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-expand

    - name: Run aggregate tests
      run: cargo test --manifest-path test_suite/Cargo.toml --test aggregation_test --test aggregate_only_test --test aggregate_e2e_test -- --test-threads=1
      env:
        DATABASE_URL: "postgres://postgres:password@localhost:5432/test_db"

  test-mysql:
    name: MySQL - Test & Benchmark
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: test_db
        options: --health-cmd="mysqladmin ping -h localhost -u root -ppassword --silent" --health-interval=10s --health-timeout=5s --health-retries=10
        ports:
          - 3306:3306
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2

    - name: Install MySQL client
      run: |
        sudo apt-get update
        sudo apt-get install -y mysql-client

    - name: Wait for MySQL
      run: |
        until mysql -h 127.0.0.1 -P 3306 -u root -ppassword -e "SELECT 1;" 2>/dev/null; do
          echo "Waiting for MySQL..."
          sleep 2
        done
        mysql -h 127.0.0.1 -P 3306 -u root -ppassword -e "CREATE DATABASE IF NOT EXISTS benchmark_db;"

    - name: Run tests
      run: cargo test --workspace -- --test-threads=1
      env:
        DATABASE_URL: "mysql://root:password@127.0.0.1:3306/test_db"

    - name: Run benchmarks
      run: |
        echo "Running benchmarks on MySQL..."
        timeout 60s cargo bench --bench crud_benchmarks -- --test || true
      env:
        DATABASE_URL: "mysql://root:password@127.0.0.1:3306/benchmark_db"
        BENCHMARK_DATABASE_URL: "mysql://root:password@127.0.0.1:3306/benchmark_db"
